<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Esto es para ti 🌹💕</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Niconne&display=swap" rel="stylesheet">
  
  <script async src="https://ga.jspm.io/npm:es-module-shims@1.6.3/dist/es-module-shims.js" crossorigin="anonymous"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
    }
  }
  </script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #2a0d1a, #0a0015 70%);
      font-family: 'Niconne', cursive;
      color: #ff69b4;
      touch-action: none; /* Mejora touch en móviles */
    }
    h1 {
      position: absolute;
      top: 5vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(2.5rem, 8vw, 6rem);
      text-shadow: 0 0 20px #ff1493, 0 0 40px #c71585;
      z-index: 20;
      text-align: center;
      max-width: 90%;
      animation: glow 4s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #ff69b4; }
      to   { text-shadow: 0 0 40px #ff1493, 0 0 80px #c71585; }
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #rose-3d {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    .flowers { display: none; } /* Ocultamos las flores 2D si usamos 3D principal, o quítalo si las quieres */

    p {
      position: fixed;
      bottom: 8vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: rgba(255, 255, 255, 0.6);
      z-index: 15;
      text-align: center;
      max-width: 90%;
    }

    canvas {
      display: block; /* Evita espacios extra */
      position: fixed;
      inset: 0;
      user-select: none;
      touch-action: none;
    }

    .special-btn {
      position: fixed;
      bottom: 12vh;
      left: 50%;
      transform: translateX(-50%);
      padding: clamp(10px, 3vw, 16px) clamp(20px, 6vw, 40px);
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-family: 'Niconne', cursive;
      color: #fff;
      background: linear-gradient(135deg, #ff69b4, #c71585);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(255,105,180,0.7);
      z-index: 25;
      transition: all 0.3s ease;
      animation: pulse-heart 2.5s infinite alternate;
      text-decoration: none;
      display: inline-block;
    }

    .special-btn:hover, .special-btn:active {
      transform: translateX(-50%) scale(1.08);
      box-shadow: 0 0 50px #ff1493;
    }

    @keyframes pulse-heart {
      0% { transform: translateX(-50%) scale(1); }
      100% { transform: translateX(-50%) scale(1.05); }
    }

    .special-btn::before { content: '🌹 '; }
    .special-btn::after { content: ' 🌹'; }

    @media (orientation: portrait) and (max-width: 600px) {
      h1 { top: 4vh; font-size: clamp(2rem, 10vw, 4rem); }
      .special-btn { bottom: 10vh; padding: 10px 25px; font-size: 1.8rem; }
      p { bottom: 6vh; font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <main>
      <h1>Porque te gustan las rosas y porque estas preciosa 🌹</h1>
      <p>Con todo cariño 💕</p>
    </main>

    <div id="rose-3d"></div>

    <!-- BOTÓN -->
    <a href="especial.html" class="special-btn">Para ti</a>
  </div>

  <!-- Pétalos cayendo (menos en móviles) -->
  <script>
    function createPetal() {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.left = Math.random() * 100 + '%';
      petal.style.animationDuration = (Math.random() * 12 + 8) + 's';
      petal.style.animationDelay = Math.random() * 6 + 's';
      petal.style.opacity = Math.random() * 0.4 + 0.6;
      petal.style.width = Math.random() * 10 + 12 + 'px';
      petal.style.height = Math.random() * 15 + 20 + 'px';
      document.body.appendChild(petal);
      setTimeout(() => petal.remove(), 25000);
    }

    const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
    const petalCount = isMobile ? 20 : 40;
    for(let i = 0; i < petalCount; i++) createPetal();
    setInterval(() => {
      if (Math.random() > (isMobile ? 0.6 : 0.3)) createPetal(); // menos frecuente en móvil
    }, isMobile ? 1200 : 600);
  </script>

  <!-- ROSA 3D responsive -->
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

    const container = document.getElementById('rose-3d');
    let camera, scene, renderer, controls;
    let originalObject;

    const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);

    init();
    animate();

    function init() {
      camera = new THREE.PerspectiveCamera(isMobile ? 55 : 40, window.innerWidth / window.innerHeight, 1, 2000);
      camera.position.set(0, 80, isMobile ? 500 : 400); // más lejos en móvil para ver todo

      scene = new THREE.Scene();

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const pointLight = new THREE.PointLight(0xffffff, 1.5);
      pointLight.position.set(200, 300, 200);
      scene.add(pointLight);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // limita en móviles para rendimiento
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      container.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.autoRotate = true;
      controls.autoRotateSpeed = isMobile ? 0.8 : 1.5; // más lento en móvil
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.enableZoom = true;
      controls.minDistance = isMobile ? 200 : 100;
      controls.maxDistance = isMobile ? 1000 : 800;
      controls.enablePan = true;
      controls.target.set(0, 0, 0);
      controls.update();

      const loader = new OBJLoader();
      loader.load(
        'https://happy358.github.io/Images/Model/red_rose3.obj',
        (obj) => {
          originalObject = obj;
          originalObject.traverse((child) => {
            if (child.isMesh) {
              let mat = new THREE.MeshStandardMaterial({
                metalness: 0,
                roughness: 0.8,
                side: THREE.DoubleSide
              });
              if (child.name.includes('rose')) mat.color.set('crimson');
              else if (child.name.includes('calyx')) mat.color.set('#001a14');
              else if (child.name.includes('leaf')) mat.color.set('#00331b');
              child.material = mat;
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });
          originalObject.rotation.set(0, Math.PI / 1.7, 0);

          const positions = [
            {x: 0, y: -50, z: 0, scale: isMobile ? 0.35 : 0.4},
            {x: 150, y: -30, z: 100, scale: isMobile ? 0.3 : 0.35},
            {x: -120, y: -40, z: -80, scale: isMobile ? 0.4 : 0.45},
            {x: 80, y: -20, z: -150, scale: isMobile ? 0.25 : 0.3},
            {x: -180, y: -60, z: 50, scale: isMobile ? 0.33 : 0.38},
            {x: 0, y: 20, z: 120, scale: isMobile ? 0.28 : 0.32}
          ];

          positions.forEach(pos => {
            const clone = originalObject.clone();
            clone.position.set(pos.x, pos.y, pos.z);
            clone.scale.setScalar(pos.scale);
            clone.rotation.y = pos.rotY || 0;
            scene.add(clone);
          });
        },
        undefined,
        (err) => console.error('Error cargando modelo:', err)
      );

      window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
      const width = window.innerWidth;
      const height = window.innerHeight;

      camera.aspect = width / height;
      camera.updateProjectionMatrix();

      renderer.setSize(width, height);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // actualiza pixel ratio (útil al rotar móvil)
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
